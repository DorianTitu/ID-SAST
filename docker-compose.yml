version: '3.8'

services:
  # Python Analyzer - Puerto 5004 (Python puro + ast)
  python-analyzer:
    build:
      context: .
      dockerfile: python-analyzer/Dockerfile
    ports:
      - "5004:5000"
    environment:
      - PORT=5000
    networks:
      - sast-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # JavaScript Analyzer - Puerto 5001 (Node.js puro + Acorn)
  js-analyzer:
    build:
      context: .
      dockerfile: js-analyzer/Dockerfile
    ports:
      - "5001:5001"
    networks:
      - sast-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Java Analyzer - Puerto 5002 (Java puro + JavaParser)
  java-analyzer:
    build:
      context: .
      dockerfile: java-analyzer/Dockerfile
    ports:
      - "5002:5002"
    networks:
      - sast-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # C# Analyzer - Puerto 5003 (.NET 8.0 puro + Roslyn)
  csharp-analyzer:
    build:
      context: .
      dockerfile: csharp-analyzer/Dockerfile
    ports:
      - "5003:5003"
    networks:
      - sast-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  sast-network:
    driver: bridge

